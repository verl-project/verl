[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "verl"
dynamic = ["version", "dependencies", "authors", "urls"]
description = "verl: Volcano Engine Reinforcement Learning for LLM"
license = {text = "Apache-2.0"}
readme = {file = "README.md", content-type = "text/markdown"}
requires-python = ">=3.10,<3.13"

# Legacy pip-facing extras (`pip install verl[X]`). These are intentionally
# thin and don't pin torch / cuDNN / NCCL. Reproducible per-backend recipes
# live in [dependency-groups] below; see docs/start/install.rst.
[project.optional-dependencies]
test         = ["pytest", "pre-commit", "py-spy", "pytest-asyncio", "pytest-rerunfailures"]
prime        = ["pyext"]
geo          = ["mathruler", "torchvision", "qwen_vl_utils"]
gpu          = ["liger-kernel", "flash-attn"]
math         = ["math-verify"]
trl          = ["trl<=0.9.6"]
mcore        = ["mbridge"]
transferqueue = ["TransferQueue==0.1.6"]

vllm   = ["tensordict>=0.8.0,<=0.10.0,!=0.9.0", "vllm>=0.8.5,<=0.12.0"]
sglang = ["tensordict>=0.8.0,<=0.10.0,!=0.9.0", "sglang[srt,openai]==0.5.8"]
trtllm = ["tensorrt-llm>=1.2.0rc6"]

# Shared runtime deps; included by every dependency group via `verl[verl-core]`.
verl-core = [
    "accelerate",
    "codetiming",
    "datasets",
    "dill",
    "hydra-core",
    "pandas",
    "peft",
    "pyarrow>=19.0.0",
    "pybind11",
    "pylatexenc",
    "ray[default]>=2.41.0",
    "torchdata",
    "tensordict>=0.8.0,<=0.10.0,!=0.9.0",
    "wandb",
    "packaging>=20.0",
    "tensorboard",
    "fastapi",
    "uvicorn",
    "mathruler",
    "qwen_vl_utils",
    "cachetools",
    "nvtx",
    "pytest",
    "pytest-asyncio",
    "pytest-rerunfailures",
]

# Reproducible per-backend recipes (PEP 735). Sync via
#   `uv sync --no-default-groups --group <name>`
# (or `python manage_envs.py sync <name>`). Backend / torch / Docker map:
#
#   cu13.0 (docker/Dockerfile.uv.cu130) — torch 2.11.0:
#     vllm, sglang, fsdp, megatron
#   cu12.9 (docker/Dockerfile.uv.cu129) — torch 2.10.0 / 2.9.1:
#     trtllm (2.10.0), veomni / nemoautomodel (2.9.1)
#   cpu — torch 2.11.0 cpu wheels
#
# torch is routed to the right wheel index via [tool.uv.sources] below.
# cuDNN / NCCL pins are inlined per group and must match the matching
# Dockerfile's apt debs (PEP 508 markers have no `group ==` operator).
[dependency-groups]

# ---- inference backends ----------------------------------------------------
vllm = [
    "verl[verl-core]",
    "torch==2.11.0",
    "torchvision==0.26.0",
    "torchaudio==2.11.0",
    "vllm==0.20.2",
    "mbridge",
    "transformers==5.3.0",
    "nvidia-cudnn-cu13==9.16.0.29",
    "nvidia-nccl-cu13==2.28.3",
]

sglang = [
    "verl[verl-core]",
    "torch==2.11.0",
    "torchvision==0.26.0",
    "torchaudio==2.11.0",
    "sglang==0.5.12",
    "mbridge",
    "transformers==5.3.0",
    "nvidia-cudnn-cu13==9.16.0.29",
    "nvidia-nccl-cu13==2.28.3",
]

# trtllm sticks on cu12.9 / torch 2.10 (no cu13 / torch-2.11 wheel yet).
trtllm = [
    "verl[verl-core]",
    "torch==2.10.0",
    "tensorrt-llm==1.3.0rc14 ; sys_platform == 'linux' and platform_machine == 'x86_64'",
    "mbridge",
    "transformers==5.3.0",
    "numpy>=2.0.0,<2.4",
    "ray[default]==2.54.1",
    "nvidia-cudnn-cu12==9.16.0.29",
    "nvidia-nccl-cu12==2.28.3",
]

# Internal sub-groups: deduplicate the prebuilt flash-attn URL across parent
# groups; routed in [tool.uv.sources].flash-attn below. Don't sync alone.
flash-attn-cu130torch211 = ["flash-attn==2.8.3"]
flash-attn-cu129torch29  = ["flash-attn==2.8.3"]

# ---- training backends -----------------------------------------------------
fsdp = [
    "verl[verl-core]",
    "torch==2.11.0",
    "torchvision==0.26.0",
    "torchaudio==2.11.0",
    {include-group = "flash-attn-cu130torch211"},
    "liger-kernel",
    "trl==0.27.0",
    "transformers==5.3.0",
    "nvidia-cudnn-cu13==9.16.0.29",
    "nvidia-nccl-cu13==2.28.3",
]

# apex / TE / megatron-core come from git (see [tool.uv.sources]) and are
# source-built. cupy-cuda13x is for Megatron MoE all-to-all.
megatron = [
    "verl[verl-core]",
    "torch==2.11.0",
    "torchvision==0.26.0",
    "torchaudio==2.11.0",
    "pybind11",
    "wheel",
    "ninja",
    "nvidia-mathdx",
    "apex",
    "transformer-engine[pytorch]",
    {include-group = "flash-attn-cu130torch211"},
    "trl==0.27.0",
    "matplotlib",
    "liger-kernel",
    "mbridge",
    "megatron-core",
    "cupy-cuda13x==14.0.1",
    "transformers==5.3.0",
    "nvidia-cudnn-cu13==9.16.0.29",
    "nvidia-nccl-cu13==2.28.3",
]

# veomni v0.1.9a5 not yet on torch 2.11 / cu13.
veomni = [
    "verl[verl-core]",
    "torch==2.9.1",
    "torchvision==0.24.1",
    "torchaudio==2.9.1",
    "veomni",
    "transformers==5.3.0",
    {include-group = "flash-attn-cu129torch29"},
    "liger-kernel",
    "hf_transfer",
    "nvidia-cudnn-cu12==9.16.0.29",
    "nvidia-nccl-cu12==2.28.3",
]

# NeMo-Automodel v0.3.0 caps torch at 2.10 → highest in-range is 2.9.1.
nemoautomodel = [
    "verl[verl-core]",
    "torch==2.9.1",
    "torchvision==0.24.1",
    "torchaudio==2.9.1",
    "nemo-automodel",
    "transformers==5.3.0",
    {include-group = "flash-attn-cu129torch29"},
    "nvidia-cudnn-cu12==9.16.0.29",
    "nvidia-nccl-cu12==2.28.3",
]

# CI / unit tests / dev sanity. uv.lock is x86_64 Linux only.
cpu = [
    "verl[verl-core]",
    "torch==2.11.0",
    "torchvision==0.26.0",
    "torchaudio==2.11.0",
    "transformers==5.3.0",
    "pytest",
    "pre-commit",
    "py-spy",
    "pytest-asyncio",
    "pytest-rerunfailures",
]

[tool.ruff]
line-length = 120
exclude = ["scripts/legacy_model_merger.py"]

[tool.ruff.lint]
isort = {known-first-party = ["verl"]}
# c.f. https://github.com/vllm-project/vllm/blob/ce8d6b75fc0586045df75ee1568a5b5f9957251b/pyproject.toml
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # isort
    "I",
    "G",
]
ignore = [
    # star imports
    "F405", "F403",
    # lambda expression assignment
    "E731",
    # Loop control variable not used within loop body
    "B007",
    # f-string format
    "UP032",
    # `.log()` statement uses f-string
    "G004",
    # X | None for type annotations
    "UP045",
    # deprecated import
    "UP035",
]

[tool.mypy]
pretty            = true
ignore_missing_imports = true
explicit_package_bases = true
follow_imports = "skip"
ignore_errors = true

[[tool.mypy.overrides]]
module = [
"verl.trainer.config.algorithm",
"verl.trainer.ppo.core_algos",
"verl.trainer.ppo.reward",
"verl.workers.reward_manager",
"verl.workers.reward_manager.*",
]
ignore_errors = false

[tool.setuptools]
include-package-data = true

[tool.setuptools.dynamic]
version = {file = "verl/version/version"}

[tool.setuptools.package-dir]
"" = "."

[tool.setuptools.package-data]
verl = [
  "version/*",
  "trainer/config/*.yaml",
  "trainer/config/*/*.yaml",
  "experimental/*/config/*.yaml",
]

# See docs/start/install.rst for the full reference. manage_envs.py wraps
# `uv sync --frozen --no-default-groups --group <backend>` per backend.
[tool.uv]
default-groups = []

# x86_64 Linux only — Ascend NPU and aarch64 GPU are out of scope.
environments = [
    "sys_platform == 'linux' and platform_machine == 'x86_64'",
]

# Backends are mutually exclusive — each fork resolves independently.
conflicts = [
    [
        { group = "vllm" },
        { group = "sglang" },
        { group = "trtllm" },
        { group = "fsdp" },
        { group = "megatron" },
        { group = "veomni" },
        { group = "nemoautomodel" },
        { group = "cpu" },
    ],
]

# transformers 5.3.0 across every backend (overrides upstream `<5` caps).
override-dependencies = [
    "transformers==5.3.0",
]

# Source-build inside the venv (no isolated build env): apex / TE need to
# link against the venv's torch ABI, and their setup.py imports torch.
no-build-isolation-package = [
    "apex",
    "transformer-engine",
    "transformer-engine-torch",
]

# Inject the project's runtime torch into the build env (no re-resolve).
[tool.uv.extra-build-dependencies]
apex                     = [{ requirement = "torch", match-runtime = true }]
transformer-engine       = [{ requirement = "torch", match-runtime = true }]
transformer-engine-torch = [{ requirement = "torch", match-runtime = true }]

# Skip lock-time metadata-extraction builds for git-source packages whose
# upstreams have no [project] section or use dynamic version. uv trusts
# these declarations; sync-time builds still run normally. Versions track
# [tool.uv.sources] below; bump together.
[[tool.uv.dependency-metadata]]
name = "apex"
version = "0.1"
requires-dist = ["torch"]

[[tool.uv.dependency-metadata]]
name = "transformer-engine"
version = "2.15.0"
requires-dist = ["torch", "pydantic"]
provides-extras = ["pytorch"]

[[tool.uv.dependency-metadata]]
name = "transformer-engine-torch"
version = "2.15.0"
requires-dist = ["torch"]

[[tool.uv.dependency-metadata]]
name = "megatron-core"
version = "0.16.1"
requires-dist = ["torch>=2.6.0", "numpy", "packaging>=24.2"]

[[tool.uv.dependency-metadata]]
name = "mbridge"
version = "0.15.1"
requires-dist = []

[[tool.uv.dependency-metadata]]
name = "veomni"
version = "0.1.9a5"
requires-dist = [
    "blobfile>=3.0.0",
    "datasets>=2.20.0,<=2.21.0",
    "packaging>=23.0,<26.0",
    "torchdata>=0.8.0,<1.0",
    "tiktoken>=0.9.0",
    "psutil",
    "timm",
    "wandb",
    "setuptools",
    "einops>=0.8.1",
]

[[tool.uv.dependency-metadata]]
name = "nemo-automodel"
version = "0.3.0"
requires-dist = [
    "datasets>=4.0.0",
    "diffusers",
    "ftfy",
    "imageio-ffmpeg",
    "megatron-fsdp>=0.2.3",
    "opencv-python-headless==4.10.0.84",
    "pybind11",
    "pyyaml",
    "torch>=2.6.0,<=2.10.0",
    "torchdata",
    "transformers>=5.0.0",
    "wandb",
    "torchao",
    "mlflow",
]

# flash-attn ships as a prebuilt wheel for every backend; this entry just
# tells uv the metadata so it doesn't try to peek inside the wheel at lock
# time. URLs live in [tool.uv.sources].flash-attn below.
[[tool.uv.dependency-metadata]]
name = "flash-attn"
version = "2.8.3"
requires-dist = ["torch"]

# Git sources track the reference Dockerfile revs.
[tool.uv.sources]
apex               = { git = "https://github.com/NVIDIA/apex.git" }
transformer-engine = { git = "https://github.com/NVIDIA/TransformerEngine.git", tag = "v2.15" }
mbridge            = { git = "https://github.com/ISEEKYAN/mbridge.git",         rev = "641a5a0" }
veomni             = { git = "https://github.com/ByteDance-Seed/VeOmni.git",    tag = "v0.1.9a5" }
nemo-automodel     = { git = "https://github.com/NVIDIA-NeMo/Automodel.git",    tag = "v0.3.0" }
megatron-core      = { git = "https://github.com/NVIDIA/Megatron-LM.git",       tag = "core_v0.16.1" }

# flash-attn 2.8.3 prebuilt wheels from
# https://github.com/mjun0812/flash-attention-prebuild-wheels/releases.
# To bump CUDA / torch / Python, swap the URL for one matching the new
# (CUDA, torch, cp-abi) tuple and update the parent group's torch pin.
# If no prebuilt exists, add `flash-attn` to no-build-isolation-package,
# list `flash-attn==2.8.3` directly in the group, and uv will source-build.
flash-attn = [
    { url = "https://github.com/mjun0812/flash-attention-prebuild-wheels/releases/download/v0.9.4/flash_attn-2.8.3%2Bcu130torch2.11-cp312-cp312-linux_x86_64.whl",  group = "flash-attn-cu130torch211" },
    { url = "https://github.com/mjun0812/flash-attention-prebuild-wheels/releases/download/v0.7.11/flash_attn-2.8.3%2Bcu129torch2.9-cp312-cp312-linux_x86_64.whl", group = "flash-attn-cu129torch29"  },
]

# Per-group routing to the matching pytorch wheel index.
torch = [
    { index = "pytorch-cu130", group = "vllm" },
    { index = "pytorch-cu130", group = "sglang" },
    { index = "pytorch-cu130", group = "fsdp" },
    { index = "pytorch-cu130", group = "megatron" },
    { index = "pytorch-cu129", group = "trtllm" },
    { index = "pytorch-cu129", group = "veomni" },
    { index = "pytorch-cu129", group = "nemoautomodel" },
    { index = "pytorch-cpu",   group = "cpu" },
]
torchvision = [
    { index = "pytorch-cu130", group = "vllm" },
    { index = "pytorch-cu130", group = "sglang" },
    { index = "pytorch-cu130", group = "fsdp" },
    { index = "pytorch-cu130", group = "megatron" },
    { index = "pytorch-cu129", group = "veomni" },
    { index = "pytorch-cu129", group = "nemoautomodel" },
    { index = "pytorch-cpu",   group = "cpu" },
]
torchaudio = [
    { index = "pytorch-cu130", group = "vllm" },
    { index = "pytorch-cu130", group = "sglang" },
    { index = "pytorch-cu130", group = "fsdp" },
    { index = "pytorch-cu130", group = "megatron" },
    { index = "pytorch-cu129", group = "veomni" },
    { index = "pytorch-cu129", group = "nemoautomodel" },
    { index = "pytorch-cpu",   group = "cpu" },
]

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu129"
url = "https://download.pytorch.org/whl/cu129"
explicit = true

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true
