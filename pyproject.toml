# -------------------------------
# build-system
# -------------------------------
[build-system]
requires = [
    "setuptools>=61.0",
    "wheel"
]
build-backend = "setuptools.build_meta"

# -------------------------------
# project (PEP 621 metadata)
# -------------------------------
[project]
name = "verl"
# `version` and `dependencies` stay dynamic so setup.py remains the source of
# truth for `pip install verl` users. `optional-dependencies` is now static
# below — manage_envs.py reads the per-backend extras alongside [tool.uv]
# source/index metadata to build isolated uv pip installs.
dynamic = ["version", "dependencies", "authors", "urls"]

description = "verl: Volcano Engine Reinforcement Learning for LLM"
license = {text = "Apache-2.0"}  # Changed from file to text format
readme = {file = "README.md", content-type = "text/markdown"}
requires-python = ">=3.10,<3.13"

# -------------------------------
# project.optional-dependencies
# -------------------------------
# 3 inference (vllm / sglang / trtllm) + 4 training (fsdp / megatron / veomni
# / nemoautomodel) GPU backends, plus a `cpu` extra for CI / sanity, all
# x86_64 Linux. Each pins its own torch/cuda stack and gets its own venv
# (`.venvs/.venv-<extra>/`). Transformers is intentionally synchronized
# across backends. Source/index routing lives in [tool.uv] below.
#
# Backend -> CUDA-major / torch / image map
# -----------------------------------------
# Two parallel cu majors live in this lockfile, one per Docker base:
#
#   cu13  (docker/Dockerfile.uv.cu130, nvidia/cuda:13.0.2-devel-ubuntu24.04):
#     vllm  -> torch 2.11.0 + torchvision 0.26.0 + torchaudio 2.11.0
#     sglang -> torch 2.11.0 + torchvision 0.26.0 + torchaudio 2.11.0
#     fsdp   -> torch 2.11.0 + torchvision 0.26.0 + torchaudio 2.11.0
#     megatron -> torch 2.11.0 + torchvision 0.26.0 + torchaudio 2.11.0
#                  (cupy-cuda13x, transformer-engine v2.15, megatron-core core_v0.16.1)
#
#   cu12.9 (docker/Dockerfile.uv.cu129, nvidia/cuda:12.9.1-devel-ubuntu24.04):
#     trtllm        -> torch 2.10.0 + tensorrt-llm 1.3.0rc14
#     veomni        -> torch 2.9.1  + torchvision 0.24.1 + torchaudio 2.9.1
#                       (upstream veomni v0.1.9a5 not yet on torch 2.11)
#     nemoautomodel -> torch 2.9.1  + torchvision 0.24.1 + torchaudio 2.9.1
#                       (NeMo-Automodel v0.3.0 needs torch in [2.6, 2.10])
#
#   cpu (any host, no GPU runtime): torch 2.11.0 cpu wheels.
#
# Each extra routes torch/torchvision/torchaudio to the matching pytorch
# wheel index via [tool.uv.sources] below. cuDNN / NCCL pip wheels are
# pinned per-extra in [tool.uv].override-dependencies (cu12 for the cu129
# fork, cu13 for the cu130 fork) and must match the apt deb versions
# baked into the corresponding Dockerfile.
#
# Ascend NPU backends (vllm-ascend / sglang-ascend / mindspeed) and aarch64
# GPU variants (e.g. GB200) are intentionally NOT exposed here — they
# require a different torch / wheel matrix and are tracked separately in
# docker/ascend/. See docs/start/install.rst.
[project.optional-dependencies]
# ---- legacy setup.py extras (kept for `pip install verl[…]` compatibility) -
test         = ["pytest", "pre-commit", "py-spy", "pytest-asyncio", "pytest-rerunfailures"]
prime        = ["pyext"]
geo          = ["mathruler", "torchvision", "qwen_vl_utils"]
gpu          = ["liger-kernel", "flash-attn"]
math         = ["math-verify"]
trl          = ["trl<=0.9.6"]
mcore        = ["mbridge"]
transferqueue = ["TransferQueue==0.1.6"]

# ---- shared verl runtime deps used by every backend extra ------------------
verl-core = [
    "accelerate",
    "codetiming",
    "datasets",
    "dill",
    "hydra-core",
    "pandas",
    "peft",
    "pyarrow>=19.0.0",
    "pybind11",
    "pylatexenc",
    "ray[default]>=2.41.0",
    "torchdata",
    "tensordict>=0.8.0,<=0.10.0,!=0.9.0",
    "wandb",
    "packaging>=20.0",
    "tensorboard",
    "fastapi",
    "uvicorn",
    "mathruler",
    "qwen_vl_utils",
    "cachetools",
    "nvtx",
    "pytest",
    "pytest-asyncio",
    "pytest-rerunfailures",
]

# ---- inference backends ----------------------------------------------------
# Rollout-only slices of the reference Dockerfiles. Transformers is
# intentionally synchronized to 5.3.0 across all backend venvs via
# [tool.uv].override-dependencies, so backend package metadata constraints
# such as `transformers<5` do not block installation.

# verl/docker/Dockerfile.stable.vllm (rollout half)
vllm = [
    "verl[verl-core]",
    "torch==2.11.0",
    "torchvision==0.26.0",
    "torchaudio==2.11.0",
    "vllm==0.20.2",
    "mbridge",
    "transformers==5.3.0",
]

# sglang/docker/Dockerfile + verl/docker/Dockerfile.stable.sglang (rollout half).
# nvidia-cudnn-cu13 / nvidia-nccl-cu13 are NOT declared here — they are
# pinned globally in [tool.uv].override-dependencies below so every CUDA
# backend resolves to the same wheel versions as the apt debs in
# docker/Dockerfile.uv.cu130.
sglang = [
    "verl[verl-core]",
    "torch==2.11.0",
    "torchvision==0.26.0",
    "torchaudio==2.11.0",
    "sglang==0.5.12",
    "mbridge",
    "transformers==5.3.0",
]

# verl/docker/Dockerfile.stable.trtllm — Linux/x86_64 only. trtllm pins
# stay on cu12.9 / torch 2.10 because tensorrt-llm 1.3.0rc14 does not
# ship cu13 / torch-2.11 PyPI wheels yet; it builds from the cu12 wheel
# index inside docker/Dockerfile.uv.cu129. ray==2.54.1 is the TRT-LLM-compat
# pin from Dockerfile.stable.trtllm L53.
trtllm = [
    "verl[verl-core]",
    "torch==2.10.0",
    "tensorrt-llm==1.3.0rc14 ; sys_platform == 'linux' and platform_machine == 'x86_64'",
    "mbridge",
    "transformers==5.3.0",
    "numpy>=2.0.0,<2.4",
    "ray[default]==2.54.1",
]

# ---- training backends -----------------------------------------------------
# Pure PyTorch FSDP — no third-party engine.
fsdp = [
    "verl[verl-core]",
    "torch==2.11.0",
    "torchvision==0.26.0",
    "torchaudio==2.11.0",
    "flash-attn==2.8.3",
    "liger-kernel",
    "trl==0.27.0",
    "transformers==5.3.0",
]

# Trainer-side union of Dockerfile.stable.{vllm,sglang}. apex / TE /
# megatron-core come from upstream git (see [tool.uv.sources]) and build from
# source via no-build-isolation. torch 2.11.0 + cu130 matches the cu13
# upstream Dockerfiles. cupy-cuda13x — used for Megatron MoE all-to-all —
# was originally added on the Dockerfile.stable.trtllm side; it stays here
# because Megatron itself needs it.
megatron = [
    "verl[verl-core]",
    "torch==2.11.0",
    "torchvision==0.26.0",
    "torchaudio==2.11.0",
    "pybind11",
    "wheel",
    "ninja",
    "nvidia-mathdx",
    "apex",
    "transformer-engine[pytorch]",
    "flash-attn==2.8.3",
    "trl==0.27.0",
    "matplotlib",
    "liger-kernel",
    "mbridge",
    "megatron-core",
    "cupy-cuda13x==14.0.1",
    "transformers==5.3.0",
]

# VeOmni v0.1.9a5 `gpu` extra slice. Pinned on cu12.9 / torch 2.9.1 because
# upstream veomni has not yet bumped to torch 2.11 / cu13. Transformers is
# still synchronized to 5.3.0 for verl runtime consistency.
veomni = [
    "verl[verl-core]",
    "torch==2.9.1",
    "torchvision==0.24.1",
    "torchaudio==2.9.1",
    "veomni",
    "transformers==5.3.0",
    "flash-attn==2.8.3",
    "liger-kernel",
    "hf_transfer",
]

# NeMo-Automodel v0.3.0 — upstream needs torch in [2.6, 2.10] and transformers
# >=5.0; flash-attn matches their `[fa]` extra cap (<=2.8.3). Pinned on
# cu12.9 / torch 2.9.1 (highest in NeMo-Automodel's supported range).
nemoautomodel = [
    "verl[verl-core]",
    "torch==2.9.1",
    "torchvision==0.24.1",
    "torchaudio==2.9.1",
    "nemo-automodel",
    "transformers==5.3.0",
    "flash-attn==2.8.3",
]

# ---- pure CPU env for CI / unit tests / dev sanity ------------------------
# Mirrors verl/.github/workflows/{cpu_unit_tests,sanity}.yml: CPU torch +
# verl-core + the full requirements-test.txt set. No flash-attn, no apex,
# no vllm/sglang. The committed uv.lock is x86_64 Linux only (see
# [tool.uv].environments below); macOS / Windows users can still
# `pip install verl[cpu]` via the legacy pip path, but `uv sync --frozen`
# requires a Linux x86_64 host.
cpu = [
    "verl[verl-core]",
    "torch==2.11.0",
    "torchvision==0.26.0",
    "torchaudio==2.11.0",
    "transformers==5.3.0",
    "pytest",
    "pre-commit",
    "py-spy",
    "pytest-asyncio",
    "pytest-rerunfailures",
]

# -------------------------------
# tool.ruff - Linting configuration
# -------------------------------
[tool.ruff]
# Note: While the formatter will attempt to format lines such that they remain within the line-length,
# it isn't a hard upper bound, and formatted lines may exceed the line-length.
line-length = 120
exclude = ["scripts/legacy_model_merger.py"]

[tool.ruff.lint]
isort = {known-first-party = ["verl"]}
# c.f. https://github.com/vllm-project/vllm/blob/ce8d6b75fc0586045df75ee1568a5b5f9957251b/pyproject.toml
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # isort
    "I",
    "G",
]
ignore = [
    # star imports
    "F405", "F403",
    # lambda expression assignment
    "E731",
    # Loop control variable not used within loop body
    "B007",
    # f-string format
    "UP032",
    # `.log()` statement uses f-string
    "G004",
    # X | None for type annotations
    "UP045",
    # deprecated import
    "UP035",
]

# -------------------------------
# tool.mypy - typechecking config
# -------------------------------
[tool.mypy]
pretty            = true
ignore_missing_imports = true
explicit_package_bases = true
follow_imports = "skip"

# Blanket silence
ignore_errors = true

[[tool.mypy.overrides]]
module = [
"verl.trainer.config.algorithm",
"verl.trainer.ppo.core_algos",
"verl.trainer.ppo.reward",
"verl.workers.reward_manager",
"verl.workers.reward_manager.*",
]
ignore_errors = false

# -------------------------------
# tool.setuptools - Additional config
# -------------------------------
[tool.setuptools]
# True means `setuptools` will attempt to include all relevant files in package_data automatically.
# This corresponds to `include_package_data=True` in setup.py.
include-package-data = true

# We read the version from a file in 'verl/version/version'
[tool.setuptools.dynamic]
version = {file = "verl/version/version"}

# If you need to mimic `package_dir={'': '.'}`:
[tool.setuptools.package-dir]
"" = "."

# If you need to include specific non-Python data (like YAML files or version file):
# This is the rough equivalent of package_data={'': ['version/*'], 'verl': ['trainer/config/*.yaml']}
[tool.setuptools.package-data]
verl = [
  "version/*",
  "trainer/config/*.yaml",
  "trainer/config/*/*.yaml",
  "experimental/*/config/*.yaml",
]

# =============================================================================
# tool.uv — see docs/start/install.rst for the full reference.
# `python manage_envs.py sync <backend>` runs `uv sync --frozen --extra X`
# against uv.lock with `UV_PROJECT_ENVIRONMENT=.venvs/.venv-<backend>`, so
# every backend resolves into its own venv from a single committed lockfile.
# =============================================================================
[tool.uv]
# Lock for x86_64 Linux only. This is the only platform / arch matrix verl's
# uv flow currently supports — Ascend NPU (aarch64 / x86_64) and aarch64
# GPU variants (Grace-Blackwell) are out of scope for now. Constraining
# environments here keeps `uv lock` from trying to resolve torch wheels for
# arches we don't ship.
#
# To extend to a new platform (e.g. aarch64 GPU or Ascend NPU):
#   1. Append a marker below, e.g.
#        "sys_platform == 'linux' and platform_machine == 'aarch64'"
#   2. Add platform-specific backend extras under
#      [project.optional-dependencies], using markers like
#      `; platform_machine == 'aarch64'` on arch-specific deps
#      (torch-npu, aarch64-only wheels, …).
#   3. Append each new extra to the `conflicts` cluster so it resolves
#      as an independent fork in uv.lock.
#   4. Wire per-extra torch / index routing in [tool.uv.sources] if
#      the new platform needs a different wheel index, and add any
#      additional git sources (e.g. mindspeed for Ascend).
#   5. Register the backend in manage_envs.py (INFERENCE_BACKENDS /
#      TRAINING_BACKENDS / PYTHON_VERSION / BUILD_ENV).
#   6. Run `uv lock` and commit pyproject.toml + uv.lock together.
# See docs/start/install.rst → "Adding a new platform or backend" for
# the full walkthrough.
environments = [
    "sys_platform == 'linux' and platform_machine == 'x86_64'",
]

# Mutually exclusive: each pins its own torch / CUDA stack; uv.lock resolves
# them as independent forks. With this declaration,
# `uv sync --extra <backend>` activates exactly one fork into the venv at
# UV_PROJECT_ENVIRONMENT (manage_envs.py wires that up per backend).
conflicts = [
    [
        { extra = "vllm" },
        { extra = "sglang" },
        { extra = "trtllm" },
        { extra = "fsdp" },
        { extra = "megatron" },
        { extra = "veomni" },
        { extra = "nemoautomodel" },
        { extra = "cpu" },
    ],
]

# Resolution-time overrides applied across every fork. Replaces the
# `_detect_system_match_packages` + `--reinstall --no-deps` postscript that
# manage_envs.py used to run after the per-backend solve.
#  * transformers — synchronized to 5.3.0 across all backends; some backend
#    metadata declares `<5`, which the override suppresses.
#  * nvidia-cudnn-cu13 / nvidia-nccl-cu13 — pinned for cu130 backends; must
#    match the apt deb versions in docker/Dockerfile.uv.cu130
#    (CUDNN_VERSION, NCCL_VERSION).
#  * nvidia-cudnn-cu12 / nvidia-nccl-cu12 — pinned for cu129 backends; must
#    match the apt deb versions in docker/Dockerfile.uv.cu129.
# Bumping either apt pin requires updating the matching override here and
# re-running `uv lock`. Overrides are inert on forks that don't transitively
# pull the package (the CPU backend doesn't pull either, so both cuDNN/NCCL
# overrides are dormant there).
override-dependencies = [
    "transformers==5.3.0",
    # cu130 fork (vllm / sglang / fsdp / megatron) — torch 2.11 transitively
    # pulls nvidia-cudnn-cu13 / nvidia-nccl-cu13; pin them to the apt-deb
    # version baked into docker/Dockerfile.uv.cu130.
    "nvidia-cudnn-cu13==9.16.0.29 ; extra == 'vllm' or extra == 'sglang' or extra == 'fsdp' or extra == 'megatron'",
    "nvidia-nccl-cu13==2.28.3 ; extra == 'vllm' or extra == 'sglang' or extra == 'fsdp' or extra == 'megatron'",
    # cu129 fork (trtllm / veomni / nemoautomodel) — torch 2.9.x / 2.10
    # transitively pulls nvidia-cudnn-cu12 / nvidia-nccl-cu12; pin them to
    # the apt-deb version baked into docker/Dockerfile.uv.cu129.
    "nvidia-cudnn-cu12==9.16.0.29 ; extra == 'trtllm' or extra == 'veomni' or extra == 'nemoautomodel'",
    "nvidia-nccl-cu12==2.28.3 ; extra == 'trtllm' or extra == 'veomni' or extra == 'nemoautomodel'",
]

# These packages `import torch` at build time, so we let them see the torch
# already installed into the backend venv. `uv sync` honors this list when
# building any of these from source. flash-attn is here because no
# precompiled cu13/torch2.11 wheel ships on PyPI yet — each backend builds
# its own against the venv's torch (matches Dockerfile.stable.{vllm,sglang}
# which set FLASH_ATTENTION_FORCE_BUILD=TRUE + --no-build-isolation).
no-build-isolation-package = [
    "apex",
    "transformer-engine",
    "transformer-engine-torch",
    "megatron-core",
    "veomni",
    "nemo-automodel",
    "flash-attn",
]

# Build-time deps that the upstream pyproject.toml files of these git-sourced
# packages forget to declare under build-system.requires. uv installs these
# into the isolated build env it spins up during `uv lock` (resolution time
# metadata extraction) AND into the in-venv build env at `uv sync` time when
# the package is in no-build-isolation-package above. Without this, lock
# fails with "ModuleNotFoundError: No module named 'setuptools'" on the
# first package whose setup.py-based build hook is invoked. Add a row here
# whenever a new git source surfaces the same error.
[tool.uv.extra-build-dependencies]
megatron-core            = ["setuptools"]
apex                     = ["setuptools"]
transformer-engine       = ["setuptools"]
transformer-engine-torch = ["setuptools"]
mbridge                  = ["setuptools"]
veomni                   = ["setuptools"]
nemo-automodel           = ["setuptools"]

# Git sources (revs match the reference Dockerfiles); PyTorch routed per-extra
# to the right CUDA wheel index.
# Note: apex (latest HEAD) auto-builds CUDA extensions when nvcc is on PATH;
# --cpp_ext / --cuda_ext flags are no longer needed or recognized.
[tool.uv.sources]
apex               = { git = "https://github.com/NVIDIA/apex.git" }
transformer-engine = { git = "https://github.com/NVIDIA/TransformerEngine.git", tag = "v2.12" }
flash-attn         = { url = "https://github.com/lesj0610/flash-attention/releases/download/v2.8.3-cu12-torch2.10-cp312/flash_attn-2.8.3%2Bcu12torch2.10cxx11abiTRUE-cp312-cp312-linux_x86_64.whl" }
mbridge            = { git = "https://github.com/ISEEKYAN/mbridge.git",         rev = "641a5a0" }
veomni             = { git = "https://github.com/ByteDance-Seed/VeOmni.git",    tag = "v0.1.9a5" }
nemo-automodel     = { git = "https://github.com/NVIDIA-NeMo/Automodel.git",    tag = "v0.3.0" }
megatron-core      = { git = "https://github.com/NVIDIA/Megatron-LM.git",       tag = "core_v0.16.1" }

torch = [
    # cu130 fork — torch 2.11.0 wheels (matches Dockerfile.uv.cu130).
    { index = "pytorch-cu130", extra = "vllm" },
    { index = "pytorch-cu130", extra = "sglang" },
    { index = "pytorch-cu130", extra = "fsdp" },
    { index = "pytorch-cu130", extra = "megatron" },
    # cu129 fork — torch 2.10.0 / 2.9.1 wheels (matches Dockerfile.uv.cu129).
    { index = "pytorch-cu129", extra = "trtllm" },
    { index = "pytorch-cu129", extra = "veomni" },
    { index = "pytorch-cu129", extra = "nemoautomodel" },
    { index = "pytorch-cpu",   extra = "cpu" },
]
torchvision = [
    { index = "pytorch-cu130", extra = "vllm" },
    { index = "pytorch-cu130", extra = "sglang" },
    # trtllm extra does not list torchvision (rollout doesn't need it)
    { index = "pytorch-cu130", extra = "fsdp" },
    { index = "pytorch-cu130", extra = "megatron" },
    { index = "pytorch-cu129", extra = "veomni" },
    { index = "pytorch-cu129", extra = "nemoautomodel" },
    { index = "pytorch-cpu",   extra = "cpu" },
]
torchaudio = [
    { index = "pytorch-cu130", extra = "vllm" },
    { index = "pytorch-cu130", extra = "sglang" },
    { index = "pytorch-cu130", extra = "fsdp" },
    { index = "pytorch-cu130", extra = "megatron" },
    { index = "pytorch-cu129", extra = "veomni" },
    { index = "pytorch-cu129", extra = "nemoautomodel" },
    { index = "pytorch-cpu",   extra = "cpu" },
]

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu129"
url = "https://download.pytorch.org/whl/cu129"
explicit = true

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true
