[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "verl"
dynamic = ["version", "dependencies", "authors", "urls"]
description = "verl: Volcano Engine Reinforcement Learning for LLM"
license = {text = "Apache-2.0"}
readme = {file = "README.md", content-type = "text/markdown"}
requires-python = ">=3.10,<3.13"

# One universal uv.lock for the whole project. Each backend is a PEP 621
# extra; mutually exclusive ones are declared in [tool.uv].conflicts (below)
# so a single `uv lock` resolves them all into one lockfile. At runtime you
# materialize exactly one conflict-free combination into the project venv:
#
#   uv sync --extra fsdp --extra vllm     # or: python manage_envs.py sync fsdp vllm
#
# There is no per-backend lockfile and no Ray py_executable switching — every
# Ray worker group runs from the same .venv. Backend / torch / Docker map
# (GPU first):
#
#   cu13.0 (docker/Dockerfile.uv.cu130) — torch 2.11.0:
#     vllm, sglang, fsdp, megatron
#   cpu — torch 2.11.0 cpu wheels (CI / unit tests / dev sanity)
#
# Both torch lines (2.11.0+cu130, 2.11.0+cpu) coexist in this one lock:
# [tool.uv].conflicts forks the resolution so each "world" pins its own torch.
# uv can hold multiple *versions* of a package across conflict forks, but only
# ONE direct *URL* per package (uv#13073); see [tool.uv.sources].flash-attn.
#
# DEFERRED — trtllm. tensorrt-llm 1.3.0rc14 needs cuda-python>=13, so it is
# really a CUDA-13 backend (torch 2.10.0+cu130), but that RC sdist's
# tightly-pinned tree makes `uv lock` explode (>17 min); its recipe is
# preserved below (commented out) to re-enable on a stable release.
#
# cuDNN / NCCL pip wheels: torch's own wheel transitively pins them (e.g. torch
# 2.11.0+cu130 -> nvidia-cudnn-cu13==9.19.0.56). What matters is that the apt
# debs in the Dockerfile match whatever uv resolves into uv.lock. After
# `uv lock` (or `python manage_envs.py lock`), grep the resolved
# `nvidia-cudnn-*==X` / `nvidia-nccl-*==Y` lines in uv.lock and update
# CUDNN_VERSION / NCCL_VERSION in docker/Dockerfile.uv.cu130.
[project.optional-dependencies]

# ---- legacy small extras (kept verbatim from setup.py) ---------------------
test          = ["pytest", "pre-commit", "py-spy", "pytest-asyncio", "pytest-rerunfailures"]
math          = ["math-verify"]
mcore         = ["mbridge"]
transferqueue = ["TransferQueue @ git+https://github.com/Ascend/TransferQueue.git@main"]

# Shared runtime deps; included by every backend extra via `verl[verl-core]`.
verl-core = [
    "accelerate",
    "codetiming",
    "datasets",
    "dill",
    "hydra-core",
    "numpy>=2.0.0",
    "pandas",
    "peft",
    "pyarrow>=19.0.0",
    "pybind11",
    "pylatexenc",
    "ray[default]>=2.41.0",
    "torchdata",
    "tensordict>=0.8.0,<=0.10.0,!=0.9.0",
    "wandb",
    "packaging>=20.0",
    "tensorboard",
    "fastapi",
    "uvicorn",
    "mathruler",
    "qwen_vl_utils",
    "cachetools",
    "nvtx",
    "pytest",
    "pytest-asyncio",
    "pytest-rerunfailures",
]

# Internal sub-extra for flash-attn URL routing (deduplicate the prebuilt
# wheel URL across parent extras). Routed in [tool.uv.sources].flash-attn
# below. Don't install alone — needs the parent extra's torch / cuDNN pins.
flash-attn-cu130torch211 = ["flash-attn==2.8.3"]

# ---- inference backends ----------------------------------------------------
vllm = [
    "verl[verl-core]",
    "torch==2.11.0",
    "torchvision==0.26.0",
    "torchaudio==2.11.0",
    "vllm==0.20.2",
    "mbridge",
    "transformers==5.3.0",
]

sglang = [
    "verl[verl-core]",
    "torch==2.11.0",
    "torchvision==0.26.0",
    "torchaudio==2.11.0",
    "sglang==0.5.12",
    "mbridge",
    "transformers==5.3.0",
]

# DEFERRED — trtllm is a CUDA-13 backend. tensorrt-llm 1.3.0rc14 requires
# cuda-python>=13 (cuda-bindings 13.x), so its torch 2.10.0 must come
# from the cu130 index and it would build in docker/Dockerfile.uv.cu130 (torch
# 2.10 fork, conflict-gated against the torch-2.11 backends). We defer it because
# that release is an unstable RC sdist whose large, tightly-pinned CUDA-13 tree
# (tensorrt~=10.15.1, cuda-python>=13, triton==3.6.0, nvidia-modelopt, cuda-tile,
# mpi4py, ...) makes `uv lock` explode (>17 min, no completion). To re-enable
# once tensorrt-llm ships a stable release: uncomment this extra, add the cu130
# torch routing + `{ extra = "trtllm" }` conflict entries (both flagged below),
# and re-lock — pinning cuda-python/tensorrt if backtracking is still slow.
# trtllm = [
#     "verl[verl-core]",
#     "torch==2.10.0",   # route to pytorch-cu130 (CUDA 13), see [tool.uv.sources]
#     "tensorrt-llm==1.3.0rc14 ; sys_platform == 'linux' and platform_machine == 'x86_64'",
#     "mbridge",
#     "transformers==5.3.0",
#     "numpy>=2.0.0,<2.4",
#     "ray[default]==2.54.1",
# ]

# ---- training backends -----------------------------------------------------
fsdp = [
    "verl[verl-core]",
    "verl[flash-attn-cu130torch211]",
    "torch==2.11.0",
    "torchvision==0.26.0",
    "torchaudio==2.11.0",
    "liger-kernel",
    "trl==0.27.0",
    "transformers==5.3.0",
]

# apex / TE / megatron-core come from git (see [tool.uv.sources]) and are
# source-built. cupy-cuda13x is for Megatron MoE all-to-all.
megatron = [
    "verl[verl-core]",
    "verl[flash-attn-cu130torch211]",
    "torch==2.11.0",
    "torchvision==0.26.0",
    "torchaudio==2.11.0",
    "pybind11",
    "wheel",
    "ninja",
    "nvidia-mathdx",
    "apex",
    "transformer-engine[pytorch]",
    "trl==0.27.0",
    "matplotlib",
    "liger-kernel",
    "mbridge",
    "megatron-core",
    "cupy-cuda13x==14.0.1",
    "transformers==5.3.0",
]

# CI / unit tests / dev sanity. No GPU runtime.
cpu = [
    "verl[verl-core]",
    "torch==2.11.0",
    "torchvision==0.26.0",
    "torchaudio==2.11.0",
    "transformers==5.3.0",
    "pytest",
    "pre-commit",
    "py-spy",
    "pytest-asyncio",
    "pytest-rerunfailures",
]

[tool.ruff]
line-length = 120
exclude = ["scripts/legacy_model_merger.py"]

[tool.ruff.lint]
isort = {known-first-party = ["verl"]}
# c.f. https://github.com/vllm-project/vllm/blob/ce8d6b75fc0586045df75ee1568a5b5f9957251b/pyproject.toml
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # isort
    "I",
    "G",
]
ignore = [
    # star imports
    "F405", "F403",
    # lambda expression assignment
    "E731",
    # Loop control variable not used within loop body
    "B007",
    # f-string format
    "UP032",
    # `.log()` statement uses f-string
    "G004",
    # X | None for type annotations
    "UP045",
    # deprecated import
    "UP035",
]

[tool.mypy]
pretty            = true
ignore_missing_imports = true
explicit_package_bases = true
follow_imports = "skip"
ignore_errors = true

[[tool.mypy.overrides]]
module = [
"verl.trainer.config.algorithm",
"verl.trainer.ppo.core_algos",
"verl.trainer.ppo.reward",
"verl.workers.reward_manager",
"verl.workers.reward_manager.*",
]
ignore_errors = false

[tool.setuptools]
include-package-data = true

[tool.setuptools.dynamic]
version = {file = "verl/version/version"}

[tool.setuptools.package-dir]
"" = "."

[tool.setuptools.package-data]
verl = [
  "version/*",
  "trainer/config/*.yaml",
  "trainer/config/*/*.yaml",
  "experimental/*/config/*.yaml",
]

# One universal uv.lock. `uv lock` resolves every extra at once; mutually
# exclusive extras (see `conflicts` below) co-exist in the lock but never in
# a single synced venv. `uv sync --extra <a> --extra <b>` then materializes
# one conflict-free combination into .venv. See docs/start/install.rst.
[tool.uv]
# x86_64 Linux + Python 3.12 only — Ascend NPU, aarch64 GPU, and other Python
# versions are out of scope for the uv flow (keeps the lock single-variant).
environments = [
    "python_full_version >= '3.12' and sys_platform == 'linux' and platform_machine == 'x86_64'",
]

# Mutually exclusive extras — at most one of each set per `uv sync`. Distinct
# torch "worlds" never mix in one venv (cu130/torch-2.11: vllm sglang fsdp
# megatron; cpu/torch-2.11). uv resolves each world in its own fork, which is
# what lets one lock hold the cu130 and cpu torch builds at once (and torch
# 2.10.0 too, once the DEFERRED trtllm backend rejoins).
#   * vllm / sglang are competing inference engines and both pin torch 2.11.0;
#     cpu is the GPU-free CI slice. The three are mutually exclusive.
#   * cpu additionally excludes the GPU training backends fsdp / megatron.
# fsdp and megatron are NOT mutually exclusive with a (cu130) inference engine,
# so a training run can sync e.g. `--extra megatron --extra vllm` into one venv.
conflicts = [
    # (trtllm DEFERRED — re-add `{ extra = "trtllm" }` to each set below when it
    #  rejoins the lock as a CUDA-13 backend; see the trtllm extra note above.)
    [{ extra = "vllm" }, { extra = "sglang" }, { extra = "cpu" }],
    [{ extra = "fsdp" }, { extra = "cpu" }],
    [{ extra = "megatron" }, { extra = "cpu" }],
]

# Global override pins:
#   * transformers 5.3.0 across every backend (overrides upstream `<5` caps).
#   * numpy>=2.0.0 floor for every backend.
override-dependencies = [
    "transformers==5.3.0",
    "numpy>=2.0.0",
]

# Source-build inside the venv (no isolated build env): apex / TE need to
# link against the venv's torch ABI, and their setup.py imports torch.
no-build-isolation-package = [
    "apex",
    "transformer-engine",
    "transformer-engine-torch",
]

# Inject the project's runtime torch into the build env (no re-resolve).
[tool.uv.extra-build-dependencies]
apex                     = [{ requirement = "torch", match-runtime = true }]
transformer-engine       = [{ requirement = "torch", match-runtime = true }]
transformer-engine-torch = [{ requirement = "torch", match-runtime = true }]
flash-attn               = [{ requirement = "torch", match-runtime = true }]

# apex's setup.py builds a Python-ONLY package unless the C++/CUDA extensions
# are explicitly requested — without this it links nothing and "builds" in
# seconds, leaving Megatron's fused kernels (FusedLayerNorm, FusedAdam, ...)
# missing. The reference Dockerfiles pass `--build-option=--cpp_ext/--cuda_ext`
# to pip; the PEP 517 equivalent apex honors (see its ENV_TO_FLAG map) is these
# env vars, so `uv sync`/`prefetch` actually run nvcc. Cache-tracked: changing
# them forces an apex rebuild. nvcc must be on PATH at build time (it is in the
# CUDA `devel` base used by docker/Dockerfile.uv.cu130); compile parallelism is
# MAX_JOBS, set per the megatron extra in manage_envs.py (BUILD_ENV).
[tool.uv.extra-build-variables]
apex = { APEX_CPP_EXT = "1", APEX_CUDA_EXT = "1" }

# Skip lock-time metadata-extraction builds for git-source packages whose
# upstreams have no [project] section or use dynamic version. uv trusts
# these declarations; sync-time builds still run normally. Versions track
# [tool.uv.sources] below; bump together.
[[tool.uv.dependency-metadata]]
name = "apex"
version = "0.1"
requires-dist = ["torch"]

[[tool.uv.dependency-metadata]]
name = "transformer-engine"
version = "2.15.0"
requires-dist = ["torch", "pydantic", "onnxscript"]
provides-extras = ["pytorch"]

[[tool.uv.dependency-metadata]]
name = "transformer-engine-torch"
version = "2.15.0"
requires-dist = ["torch"]

[[tool.uv.dependency-metadata]]
name = "megatron-core"
version = "0.16.1"
requires-dist = ["torch>=2.6.0", "numpy", "packaging>=24.2"]

[[tool.uv.dependency-metadata]]
name = "mbridge"
version = "0.15.1"
requires-dist = []

# flash-attn ships as a prebuilt wheel for every backend; this entry just
# tells uv the metadata so it doesn't try to peek inside the wheel at lock
# time. URLs live in [tool.uv.sources].flash-attn below.
[[tool.uv.dependency-metadata]]
name = "flash-attn"
version = "2.8.3"
requires-dist = ["torch"]

# Git sources track the reference Dockerfile revs.
[tool.uv.sources]
apex               = { git = "https://github.com/NVIDIA/apex.git" }
transformer-engine = { git = "https://github.com/NVIDIA/TransformerEngine.git", tag = "v2.15" }
mbridge            = { git = "https://github.com/ISEEKYAN/mbridge.git",         rev = "641a5a0" }
megatron-core      = { git = "https://github.com/NVIDIA/Megatron-LM.git",       tag = "core_v0.16.1" }

# flash-attn 2.8.3 prebuilt wheels from
# https://github.com/mjun0812/flash-attention-prebuild-wheels/releases.
# To bump CUDA / torch / Python, swap the URL for one matching the new
# (CUDA, torch, cp-abi) tuple and update the parent extra's torch pin.
# If no prebuilt exists, add `flash-attn` to no-build-isolation-package,
# list `flash-attn==2.8.3` directly in the parent extra, and uv source-builds.
# Only ONE direct URL is allowed per package across the whole lock — uv does
# NOT fork direct URLs by conflicting extras (astral-sh/uv#13073).
flash-attn = [
    { url = "https://github.com/mjun0812/flash-attention-prebuild-wheels/releases/download/v0.9.4/flash_attn-2.8.3%2Bcu130torch2.11-cp312-cp312-linux_x86_64.whl",  extra = "flash-attn-cu130torch211" },
]

# Per-extra routing to the matching pytorch wheel index.
torch = [
    { index = "pytorch-cu130", extra = "vllm" },
    { index = "pytorch-cu130", extra = "sglang" },
    { index = "pytorch-cu130", extra = "fsdp" },
    { index = "pytorch-cu130", extra = "megatron" },
    { index = "pytorch-cpu",   extra = "cpu" },
    # trtllm (DEFERRED) would route to CUDA 13 here:
    #   { index = "pytorch-cu130", extra = "trtllm" },
]
torchvision = [
    { index = "pytorch-cu130", extra = "vllm" },
    { index = "pytorch-cu130", extra = "sglang" },
    { index = "pytorch-cu130", extra = "fsdp" },
    { index = "pytorch-cu130", extra = "megatron" },
    { index = "pytorch-cpu",   extra = "cpu" },
]
torchaudio = [
    { index = "pytorch-cu130", extra = "vllm" },
    { index = "pytorch-cu130", extra = "sglang" },
    { index = "pytorch-cu130", extra = "fsdp" },
    { index = "pytorch-cu130", extra = "megatron" },
    { index = "pytorch-cpu",   extra = "cpu" },
]

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true
