_target_: verl.workers.config.McoreOptimizerConfig

# Learning rate
lr: 1e-3

# LR warmup steps ratio
lr_warmup_steps_ratio: 0.0

# Total training steps
total_training_steps: -1

# Weight decay
weight_decay: 0.01

# LR warmup steps
lr_warmup_steps: -1

# Betas for Adam optimizer
betas: [0.9, 0.999]

# Clip gradient
clip_grad: 1.0

# optimizer algorithm. "adam"/"sgd" use Megatron's classic optimizers; "muon"
# route through Megatron-Core's emerging_optimizers path (tensor-parallel-aware Muon). The muon_*
# options below only take effect when a Muon algorithm is selected.
optimizer: adam

# initial learning rate for warmup, default to 0.0
lr_warmup_init: 0.0

lr_decay_steps: null

# select from constant/linear/cosine/inverse_square_root
lr_decay_style: constant

# minimum learning rate, default to 0.0
min_lr: 0.0

# select from constant/linear/cosine
weight_decay_incr_style: constant

# select from constant/exponential/cosine
lr_wsd_decay_style: exponential

lr_wsd_decay_steps: null

# use checkpoint optimizer parameter scheduler
use_checkpoint_opt_param_scheduler: False

# Enable Megatron's precision-aware optimizer (bf16 training only, opt-in).
# When True, the grad-accumulation buffer and Adam moments follow the dtypes
# below instead of fp32, trimming optimizer-state memory. Requires TE FusedAdam.
use_precision_aware_optimizer: False

# dtype of the main-grad / grad-accumulation buffer when use_precision_aware_optimizer
# is enabled. Also drives the DDP grad-bucket dtype. select from fp32/bf16
main_grads_dtype: fp32

# dtype of the Adam first moment (m) when use_precision_aware_optimizer is enabled. fp32/bf16
exp_avg_dtype: fp32

# dtype of the Adam second moment (v) when use_precision_aware_optimizer is enabled. fp32/bf16
exp_avg_sq_dtype: fp32
# Muon (emerging optimizer) options. Only consumed when `optimizer` selects a Muon algorithm;
# each mirrors the like-named field on Megatron-Core's OptimizerConfig. Defaults track Megatron-Core.
use_layer_wise_distributed_optimizer: False
muon_momentum: 0.95
muon_nesterov: False
muon_split_qkv: True
muon_scale_mode: spectral
muon_coefficient_type: quintic
muon_num_ns_steps: 5
muon_tp_mode: blockwise
muon_fp32_matmul_prec: medium
muon_extra_scale_factor: 1.0
muon_scalar_optimizer: adam

override_optimizer_config: {}
