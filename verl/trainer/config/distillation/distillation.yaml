# Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
_target_: verl.workers.config.DistillationConfig

# specify the default per-component configs
defaults:

  # <folder_name>@<field_name>.<field_name>: <yaml_file_name>

  # load the default config, then apply the fields in the current yaml
  # self config override anything above
  - _self_

# Whether to enable distillation.
enabled: false

# distillation loss config
distillation_loss:

  # # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
  _target_: verl.workers.config.DistillationLossConfig


  # Loss function mode for distillation
  loss_mode: k3

  # If distillation loss requires top-k logits, this is the value of k
  topk: 32

  # Whether to include task rewards alongside distillation loss.
  use_task_rewards: true


  # The coef of the distillation loss when use_task_rewards is true
  distillation_loss_coef: 1.0

  # Optional max clamp value for distillation loss. If null, no clamping is applied.
  loss_max_clamp: null

  # Optional min clamp value for log probabilities for stability, e.g., log q - log p where p or q are very close to zero.
  log_prob_min_clamp: null

  # OPSD per-vocab pointwise KL clip tau (arXiv:2601.18734). Clamps each per-vocab
  # forward-KL contribution to <= clip_tau BEFORE the vocab sum. null == off.
  # Distinct from loss_max_clamp (whole-position, post-sum). FSDP forward_kl_topk only.
  clip_tau: null

  # OPSD reference parity (siyan-zhao/OPSD). When false, the per-token top-k divergence is
  # NOT floored at 0, so (with clip_tau) it may go negative and keep gradient on tokens where
  # the student already over-covers the teacher. true == original verl behavior. FSDP forward_kl_topk only.
  clamp_negative_to_zero: true

  # Softmax temperature applied to BOTH student and teacher logits before the top-k KL, matching the
  # reference (student_logits/T, teacher_logits/T, renormalized over top-k). null == no scaling (T=1).
  # FSDP forward_kl_topk only.
  loss_temperature: null

  # Whether to incorporate distillation loss as a reward.
  use_policy_gradient: false

  # Name of the policy loss to use when use_policy_gradient is true.
  policy_loss_mode: "vanilla"

  # PPO clipping ratio for policy loss.
  clip_ratio: 0.2

  # Lower bound for PPO clipping ratio.
  clip_ratio_low: 0.2 

  # Upper bound for PPO clipping ratio.
  clip_ratio_high: 0.2


# Number of GPUs per node in the distillation teacher resource pool
n_gpus_per_node: 8

# Number of nodes in the distillation teacher resource pool
nnodes: 0

# multi-teacher configs
teacher_models:

  # Single-teacher config. This entry is popped when other teacher entries are added, so
  # using `teacher_model` as one of several keys silently drops it. For
  # example, the following CLI overrides result in ONLY `teacher_model2` being used:
  #
  # distillation.teacher_models.teacher_model.key=openai/gsm8k
  # distillation.teacher_models.teacher_model.model_path=Qwen/Qwen3-4B
  # +distillation.teacher_models.teacher_model2.key=hiyouga/geometry3k
  # +distillation.teacher_models.teacher_model2.model_path=Qwen/Qwen3-VL-4B-Instruct
  #
  # Instead, give the first teacher a different name:
  #
  # +distillation.teacher_models.teacher_model1.key=openai/gsm8k
  # +distillation.teacher_models.teacher_model1.model_path=Qwen/Qwen3-4B
  # +distillation.teacher_models.teacher_model2.key=hiyouga/geometry3k
  # +distillation.teacher_models.teacher_model2.model_path=Qwen/Qwen3-VL-4B-Instruct
  teacher_model:
    _target_: verl.workers.config.DistillationTeacherModelConfig
    key: null
    model_path: null
    num_replicas: 0
    inference:
      _target_: verl.workers.config.RolloutConfig
      name: ${oc.select:actor_rollout_ref.rollout.name}
      dtype: ${oc.select:actor_rollout_ref.rollout.dtype}
      gpu_memory_utilization: 0.5
      enforce_eager: true
      cudagraph_capture_sizes: null
      free_cache_engine: true
      data_parallel_size: 1
      expert_parallel_size: 1
      tensor_model_parallel_size: 2
      max_num_batched_tokens: 8192
      max_model_len: null
      max_num_seqs: 1024
      load_format: auto
      engine_kwargs: {}
      limit_images: null
      enable_chunked_prefill: true
      enable_prefix_caching: true
      disable_log_stats: true
      skip_tokenizer_init: true
      prompt_length: ${oc.select:actor_rollout_ref.rollout.prompt_length}
      response_length: ${oc.select:actor_rollout_ref.rollout.response_length}
      temperature: ${oc.select:actor_rollout_ref.rollout.temperature}

# Key to route examples to the appropriate teacher model in multi-teacher setups. Should correspond to a field in the data proto, e.g., task.
teacher_key: data_source

# On-Policy Self-Distillation (OPSD, arXiv:2601.18734): teacher == the same model
# under a privileged context [x, y*, bridge]. See docs/algo/opsd.md.
self_distillation:
  _target_: verl.workers.config.SelfDistillationConfig

  # Route teacher logprobs through the privileged-context builder. Requires enabled=true above.
  enabled: false

  # "frozen" (default, reproduces the paper): teacher == initial checkpoint theta_0, served by the
  # existing OPD teacher pool (set teacher_models.*.model_path to the student base). "live" is a
  # follow-up (teacher == current weights on the rollout engine; trainer wiring not yet landed).
  teacher_weights: frozen

  # Per-sample non-tensor fields holding the privileged solution y* and the raw problem x
  # (dotted paths traverse dicts). The teacher prompt is rebuilt from (problem, solution)
  # via the chat template (teacher_template), matching the reference impl.
  reference_key: reward_model.ground_truth
  problem_key: problem

  # enable_thinking passed to the teacher's chat template (Qwen3). Default True.
  teacher_thinking: true

  # teacher_template defaults to the reference impl's user message in SelfDistillationConfig
  # (problem + reference solution + transition). Override here only if needed.

  # Token budgets: solution is truncated to max_reference_length; max_bridge_length covers the
  # template/transition text. Together they size the teacher max_model_len / prompt_length.
  max_reference_length: 2048
  max_bridge_length: 256