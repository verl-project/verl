# Format checks enforced on CI:
# 1. Comments must appear above each field.
# 2. There must be a blank line between each field.
# 3. Inline comments (after a field on the same line) are not allowed.
# 4. Indentation level is respected for nested fields.

# Per-backend block loaded into `config.remote_backend` via Hydra defaults
# (`+remote_backend@remote_backend=arctic`). Selected at runtime by `trainer.remote_backend=arctic`. Companion adapter:
# `verl.workers.remote_client.arctic_rl.ArcticRLClientWrapper`.

# whether to use colocate mode
colocate: True

# number of GPUs allocated to the training engine
training_gpus: 1

# number of GPUs allocated to the sampling/inference engine
sampling_gpus: 1

# number of GPUs allocated to the log-prob engine; 0 means colocated with training
log_prob_gpus: 1

# tensor-parallel size for the sampling engine
sampling_tp_size: 1

# ZoRRO training path. Server reads these flat (`zorro_train_<key>`) from ds_worker_config and per-call meta.
zorro_train:

  # whether to use zorro packing for off-policy log-probs
  enable: False

  # load-balancer over zorro groups (no server consumer yet; forward-compat with group-balanced routing)
  load_balancer: True

  # should equal actor_rollout_ref.rollout.n for best perf
  max_rollouts: ${actor_rollout_ref.rollout.n}

# Rollout-side Arctic Inference optimizations. Passed straight through to the
# server as `arctic_inference_config` (parse_arctic_inference_rollout); the server
# treats an all-disabled block as "off". Requires a matching vllm + ArcticInference
# plugin build (https://github.com/snowflakedb/ArcticInference).
rollout:

  # Forest Cascade Attention (FCA) for efficient rollout
  zorro_inference:

    # whether to enable FCA on the sampling engine
    enable: False

  # Arctic speculative decoding draft model (empty disables speculative decoding)
  speculative_decoding:

    # path or name of the draft model
    model: ""

# ray or http: ray would be much faster for payload comms in the on-prem use case
comm_protocol: ray

# Drop position_ids on the wire; server reconstructs from attention_mask. Set False for mrope / 3D rope.
drop_position_ids: True

# Logprob/entropy compute strategy over vocab logits; only move off `none` on OOM.
#   none    - fused single-call, fastest, ~2x peak logits memory.
#   memory  - never manifests full logits; recompute in backward (zorro_train.enable=True only).
#   compute - manifest logits once, chunk the softmax/entropy; in-between on memory/compute.
logits_optimization: none

# Per-chunk peak memory budget (GiB) for `memory` / `compute` modes. Smaller -> more chunks, less peak, more compute.
logits_optimization_peak_mem_size_in_gib: 4

# Upcast produced logits to fp32 before logprob/entropy/loss math; no-op if already fp32.
logits_compute_in_fp32: False

# Upcast the LM-head input to fp32 so the logits projection runs in fp32. Improves
# numerical precision at the cost of extra compute/memory for the head. ZoRRO path only.
logits_compute_from_fp32_inputs: False

# Zero-copy CUDA IPC weight sync between train and rollout engines (bypasses NCCL). Only with colocate=True.
cuda_ipc_weight_sync: False

# Stream one param at a time during CUDA-IPC sync to bound peak extra GPU mem to one full param/GPU instead of the
# whole model. Only with cuda_ipc_weight_sync=True and colocate=True.
low_memory_weight_sync: False

# DeepSpeed engine config: passed through (OmegaConf.to_container) into the DS engine,
# merged with train_micro_batch_size_per_gpu / train_batch_size / grad_accum / sequence_parallel_size.
# Mirrors recipe/rl-correctness arctic_rl.deepspeed.
deepspeed:

  # Torch Autocast (bfloat16 forward). Disabled by default: PyPI DeepSpeed 0.19.2 does not
  # respect autocast cleanly; enable only on a DS build that supports it (see HANDOFF.md for the pinned clone).
  torch_autocast:

    enabled: False

    dtype: bfloat16

  # Communication data type for cross-GPU all_reduce / all_gather
  communication_data_type: fp32

  # Gradient accumulation dtype; `fp32` keeps grads in float32 but requires a DS build that
  # recognises the `data_types` block (see HANDOFF.md for the pinned clone). Use `bf16` on
  # stock PyPI DeepSpeed 0.19.2 to avoid the unrecognized-config branch.
  data_types:

    grad_accum_dtype: bf16

  # ZeRO sharding stage + offload knobs
  zero_optimization:

    # 2 for optim + grad sharding; 3 also shards weights
    stage: 0

    offload_optimizer:

      # `none` keeps the optimizer state on GPU; `cpu` offloads it
      device: none

    offload_param:

      # `none` keeps params on GPU; `cpu` offloads them
      device: none

  # DeepSpeed engine log level
  log_level: INFO
