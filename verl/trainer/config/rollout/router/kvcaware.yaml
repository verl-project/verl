# KV-cache- + load-aware router config (merged from the four migrated router
# YAMLs: kvc_aware_router + strategies/kvc_aware_strategy + collector + cache_store).
#
# Selected via rollout.yaml ``defaults: [- router@router_config: kvcaware]``; Hydra composes
# this whole file under the rollout ``router_config`` node. The mere presence of the
# ``router_config`` node signals the kvcaware router; ``get_router_handle`` dispatches
# accordingly.
#
# Layout note: ``strategies`` is a LIST here (KVCAwareConfig._extract_strategies accepts
# list or dict). Each strategy item MUST carry ``_target_`` — from_config hydra-instantiates it.

strategies:
  - _target_: verl.workers.rollout.router.kvcaware.config.strategy.KVCAwareStrategyConfig
    memory_overload_filter: True
    # prefix-load-aware / least-inflight
    slow_cut: prefix-load-aware
    weight: 1.0
    alpha: 0.3
    # overload when load > threshold (load ∈ [0,1], bigger = more loaded)
    load_threshold: 0.6
    layer_weights:
      gpu: 0.7
      cpu: 0.2
      ssd: 0.1
    collector_names:
      - vllm_zmq
      - vllm_metrics
      - sticky_stat
      - inflight_stat

# Collector connection-type tuning (HTTP polling + ZMQ long-connection).
collector:
  http_polling:
    polling_interval: 5
    http_timeout: 10
  long_connection:
    base_retry_delay: 1.0
    max_retry_delay: 30.0
    max_retry_attempts: 5
    retry_backoff_factor: 2.0

# KV cache store tuning.
cache_store:
  kv_cache_store_type: list
  ttl: 30
