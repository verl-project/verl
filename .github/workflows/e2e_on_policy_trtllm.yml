# # Tests layout
#
# Each folder under tests/ corresponds to a test category for a sub-namespace in verl. For instance:
# - `tests/trainer` for testing functionality related to `verl/trainer`
# - `tests/models` for testing functionality related to `verl/models`
# - ...
#
# There are a few folders with `special_` prefix, created for special purposes:
# - `special_distributed`: unit tests that must run with multiple GPUs
# - `special_e2e`: end-to-end tests with training/generation scripts (CPU/CUDA/NPU)
# - `special_sanity`: a suite of quick sanity tests
# - `special_standalone`: a set of test that are designed to run in dedicated environments
#
# # Workflow layout
#
# This workflow exercises the on-policy GRPO trainer for the TensorRT-LLM
# inference backend. It is one of three sibling files split by inference
# backend (each pinned to its own image), so a PR that only changes
# vllm/sglang/trtllm rollout code only triggers the matching workflow:
#
#   - e2e_on_policy_vllm.yml
#   - e2e_on_policy_sglang.yml
#   - e2e_on_policy_trtllm.yml  (this file, image: ${{ env.IMAGE }})
#
# Cells exercised here (NVIDIA GPU, TRT-LLM image):
#
#   train\modality | LLM              | VLM
#   ---------------+------------------+------------------
#   megatron       | megatron_trtllm  | megatron_trtllm_vlm
#
# TRT-LLM rollout unit tests also run on this image.

name: e2e_on_policy_trtllm

# PR trigger:
#   Exercises Megatron x TRT-LLM x {llm, vlm}.

on:
  pull_request:
    branches:
      - main
      - v0.*
    paths:
      - ".github/workflows/e2e_on_policy_trtllm.yml"
      # Drivers (LLM + VLM) reachable from this file
      - "examples/data_preprocess/gsm8k.py"
      - "examples/data_preprocess/geo3k.py"
      - "examples/grpo_trainer/run_qwen3_8b_megatron.sh"
      - "examples/grpo_trainer/run_qwen3_vl_8b_megatron.sh"
      # TRT-LLM rollout unit tests
      - "tests/workers/rollout/rollout_trtllm/**"
      # Worker backends / rollout
      - "verl/workers/**"
      # Trainer / config
      - "verl/trainer/**"
      # Library core
      - "verl/utils/**"
      - "verl/models/**"
      - "verl/single_controller/**"
      - "verl/third_party/**"
      # Build / deps
      - "pyproject.toml"
      - "setup.py"
      - "requirements.txt"
      - "requirements-test.txt"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  IMAGE: "verl-ci-cn-beijing.cr.volces.com/verlai/verl:trtllm1.3.0rc14"
  DYNAMIC_RUNNER_ENDPOINT: "https://sd10g3clalm04ug7alq90.apigateway-cn-beijing.volceapi.com/runner"

jobs:
  # ---------- TRT-LLM-image runner (shared by all jobs in this file) ----------
  setup:
    if: github.repository_owner == 'verl-project'
    runs-on: ubuntu-latest
    outputs:
      runner-label: ${{ steps.create-runner.outputs.runner-label }}
      mlp-task-id: ${{ steps.create-runner.outputs.mlp-task-id }}
    steps:
      - uses: actions/checkout@v4
      - id: create-runner
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "create"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-image: "${{ env.IMAGE }}"

  # ============================================================
  # TRT-LLM rollout unit tests
  # ============================================================
  trtllm_unit_tests:
    needs: setup
    runs-on: ["${{ needs.setup.outputs.runner-label || 'L20x8' }}"]
    timeout-minutes: 30
    env:
      HTTPS_PROXY: ${{ secrets.PROXY_HTTPS }}
      NO_PROXY: "localhost,127.0.0.1,hf-mirror.com"
      HF_ENDPOINT: "https://hf-mirror.com"
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      TORCH_CUDA_ARCH_LIST: "7.5;8.0;8.9;9.0;10.0;12.0+PTX"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Reinstall FlashInfer for runtime GPU arch
        run: |
          unset TORCH_CUDA_ARCH_LIST
          pip3 install --force-reinstall --no-deps flashinfer-python
      - name: Install the current repository
        run: |
          pip3 install pytest-asyncio
          pip3 install -r requirements-test.txt
          pip3 install --no-deps -e .
      - name: Run TRT-LLM unit tests
        run: |
          unset TORCH_CUDA_ARCH_LIST  # Let TRT-LLM CUTLASS DSL auto-detect runtime GPU arch
          export TRTLLM_ENABLE_PDL=0  # Disable Programmatic Dependent Launch (uses SM 9.0 griddepcontrol)
          export TRTLLM_TEST_MODEL_PATH_ROOT="${HOME}/models"
          ray stop --force
          pytest -v -s --durations=20 \
            tests/workers/rollout/rollout_trtllm/test_adapter.py \
            tests/workers/rollout/rollout_trtllm/test_async_server.py \
            tests/workers/rollout/rollout_trtllm/test_inter_node_rollout.py \
            tests/workers/rollout/rollout_trtllm/test_trtllm_rollout_utils.py
          ray stop --force
          pytest -v -s --durations=20 \
            tests/workers/rollout/rollout_trtllm/test_trtllm_abort.py

  # ============================================================
  # Megatron x TRT-LLM
  #   Driver: examples/grpo_trainer/run_qwen3_8b_megatron.sh
  #   Model:  Qwen/Qwen3-0.6B
  # ============================================================
  megatron_trtllm:
    needs: setup
    runs-on: ["${{ needs.setup.outputs.runner-label || 'L20x8' }}"]
    timeout-minutes: 30
    env:
      HTTPS_PROXY: ${{ secrets.PROXY_HTTPS }}
      NO_PROXY: "localhost,127.0.0.1,hf-mirror.com"
      HF_ENDPOINT: "https://hf-mirror.com"
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      TORCH_CUDA_ARCH_LIST: "7.5;8.0;8.9;9.0;10.0;12.0+PTX"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Reinstall FlashInfer for runtime GPU arch
        run: |
          unset TORCH_CUDA_ARCH_LIST
          pip3 install --force-reinstall --no-deps flashinfer-python
      - name: Install the current repository
        run: |
          pip3 install -r requirements-test.txt
          pip3 install --no-deps -e .
          pip3 install math-verify
          # WAR: CI image predates mbridge cf71117 (removes `imp` for Python 3.12). Drop this line after CI image is refreshed.
          pip3 install --force-reinstall --no-deps --no-build-isolation git+https://github.com/ISEEKYAN/mbridge.git
      - name: Prepare GSM8K dataset
        run: |
          python3 examples/data_preprocess/gsm8k.py --local_dataset_path ${HOME}/models/hf_data/gsm8k --local_save_dir ${PWD}/data/gsm8k
      - name: GRPO LLM (Megatron + TRT-LLM, Qwen3-0.6B)
        run: |
          unset TORCH_CUDA_ARCH_LIST  # Let TRT-LLM CUTLASS DSL auto-detect runtime GPU arch
          export TRTLLM_ENABLE_PDL=0  # Disable Programmatic Dependent Launch (uses SM 9.0 griddepcontrol)
          ray stop --force
          ACTOR_TP=2 \
          ACTOR_PP=1 \
          ROLLOUT_TP=2 \
          INFER_BACKEND=trtllm \
          MODEL_PATH="${HOME}/models/Qwen/Qwen3-0.6B" \
            bash examples/grpo_trainer/run_qwen3_8b_megatron.sh \
            trainer.total_training_steps=1 \
            data.train_batch_size=32 \
            data.max_prompt_length=128 \
            data.max_response_length=64 \
            actor_rollout_ref.actor.ppo_mini_batch_size=32 \
            actor_rollout_ref.actor.ppo_max_token_len_per_gpu=2048 \
            actor_rollout_ref.rollout.n=1 \
            actor_rollout_ref.rollout.max_num_seqs=32 \
            actor_rollout_ref.rollout.max_num_batched_tokens=1024 \
            actor_rollout_ref.rollout.max_model_len=256 \
            data.train_files="['${PWD}/data/gsm8k/train.parquet']" \
            data.val_files="['${PWD}/data/gsm8k/test.parquet']" \
            trainer.logger='["console"]'
      - name: clean up
        run: rm -rf checkpoints

  # ============================================================
  # Megatron x TRT-LLM - VLM
  #   Driver: examples/grpo_trainer/run_qwen3_vl_8b_megatron.sh
  #   Model:  Qwen/Qwen3-VL-2B-Instruct
  #   Data:   GEO3K
  # ============================================================
  megatron_trtllm_vlm:
    needs: setup
    runs-on: ["${{ needs.setup.outputs.runner-label || 'L20x8' }}"]
    timeout-minutes: 30
    env:
      HTTPS_PROXY: ${{ secrets.PROXY_HTTPS }}
      NO_PROXY: "localhost,127.0.0.1,hf-mirror.com"
      HF_ENDPOINT: "https://hf-mirror.com"
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      TORCH_CUDA_ARCH_LIST: "7.5;8.0;8.9;9.0;10.0;12.0+PTX"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Reinstall FlashInfer for runtime GPU arch
        run: |
          unset TORCH_CUDA_ARCH_LIST
          pip3 install --force-reinstall --no-deps flashinfer-python
      - name: Install the current repository
        run: |
          pip3 install -r requirements-test.txt
          pip3 install --no-deps -e .
          pip3 install qwen_vl_utils
          pip3 install mathruler
          # WAR: CI image predates mbridge cf71117 (removes `imp` for Python 3.12). Drop this line after CI image is refreshed.
          pip3 install --force-reinstall --no-deps --no-build-isolation git+https://github.com/ISEEKYAN/mbridge.git
      - name: Prepare GEO3K dataset
        run: |
          python3 examples/data_preprocess/geo3k.py --local_dataset_path ${HOME}/models/hf_data/hiyouga/geometry3k --local_save_dir ${PWD}/data/geo3k
      - name: GRPO VLM (Megatron + TRT-LLM, Qwen3-VL-2B)
        run: |
          unset TORCH_CUDA_ARCH_LIST  # Let TRT-LLM CUTLASS DSL auto-detect runtime GPU arch
          export TRTLLM_ENABLE_PDL=0  # Disable Programmatic Dependent Launch (uses SM 9.0 griddepcontrol)
          ray stop --force
          ACTOR_TP=2 \
          ACTOR_PP=1 \
          ROLLOUT_TP=2 \
          INFER_BACKEND=trtllm \
          MODEL_PATH="${HOME}/models/Qwen/Qwen3-VL-2B-Instruct" \
            bash examples/grpo_trainer/run_qwen3_vl_8b_megatron.sh \
            trainer.total_training_steps=1 \
            data.train_batch_size=8 \
            data.max_prompt_length=512 \
            data.max_response_length=64 \
            actor_rollout_ref.actor.ppo_mini_batch_size=8 \
            actor_rollout_ref.actor.ppo_max_token_len_per_gpu=2048 \
            actor_rollout_ref.rollout.n=1 \
            actor_rollout_ref.rollout.gpu_memory_utilization=0.35 \
            actor_rollout_ref.rollout.max_model_len=2048 \
            actor_rollout_ref.rollout.max_num_seqs=16 \
            actor_rollout_ref.rollout.max_num_batched_tokens=2048 \
            actor_rollout_ref.rollout.log_prob_max_token_len_per_gpu=2048 \
            actor_rollout_ref.ref.log_prob_max_token_len_per_gpu=2048 \
            data.train_files="['${PWD}/data/geo3k/train.parquet']" \
            data.val_files="['${PWD}/data/geo3k/test.parquet']" \
            trainer.logger='["console"]'
      - name: clean up
        run: rm -rf checkpoints

  # ---------- cleanup of dynamic runner ----------
  cleanup:
    runs-on: ubuntu-latest
    needs:
      - setup
      - trtllm_unit_tests
      - megatron_trtllm
      - megatron_trtllm_vlm
    if: always()
    steps:
      - id: destroy-runner
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "destroy"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-task-id: "${{ needs.setup.outputs.mlp-task-id }}"
