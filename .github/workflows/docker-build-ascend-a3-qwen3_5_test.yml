name: docker-build-ascend-a3-qwen3_5

on:
  pull_request:
    branches:
      - main
      - v0.*
    paths:
      - ".github/workflows/docker-build-ascend-a3-qwen3_5_test.yml"

jobs:
  build-ascend-image-a3:
    if: ${{ github.repository_owner == 'verl-project' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.platform }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
    steps:
      - name: Remove unnecessary parts in github actions runners to free up disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean Docker cache before build
        run: |
          docker system prune -a -f --volumes || true

      - name: Build image (no push on PR)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          file: ./docker/ascend/Dockerfile.ascend_8.5.1_a3_qwen3-5
          push: false  # PR 时不推送，只构建验证
          tags: |
            quay.io/ascend/verl:verl-8.5.1-a3-ubuntu22.04-py3.11-qwen3-5-${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
